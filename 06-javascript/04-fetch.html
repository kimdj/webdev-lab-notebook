<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaScript Exercise 04 - Fetch</title>
  <link rel="stylesheet" href="04-fetch.css" />
</head>

<body>
  <main>
    <nav class="navbar">
      <h1 class="brand-logo">Pokedex</h1>
      <input type="search" id="search-input" class="search-input" placeholder="Search Pokémon..."
        aria-label="Search Pokemons" />
    </nav>

    <div id="status" class="status">
      <img src="../images/loader.gif" alt="Loading..." class="loader" />
      <p>Fetching data...</p>
    </div>

    <section id="pokemon-container"></section>
  </main>

  <script src="04-fetch.js"></script>
</body>

</html>
