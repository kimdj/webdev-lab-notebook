<!doctype html>

<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bootstrap Exercise 02 - Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">
  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow p-4">
          <h1 class="text-center mb-4 fs-2">Roth IRA Calculator</h1>

          <form>
            <div class="row mb-3">
              <label for="balance" class="col-md-5 col-form-label">Balance ($)</label>
              <div class="col-md-7">
                <input id="balance" name="balance" type="number" class="form-control" required />
              </div>
            </div>

            <div class="row mb-3">
              <label for="annual-contribution" class="col-md-5 col-form-label">Annual Contribution ($)</label>
              <div class="col-md-7">
                <input id="annual-contribution" name="annualContribution" type="number" class="form-control" required />
              </div>
            </div>

            <div class="row mb-3">
              <span class="col-md-5 col-form-label">Maximize contributions?</span>
              <div class="col-md-7">
                <div class="form-check">
                  <input class="form-check-input" id="maximize-yes" name="maximize" type="radio" value="yes" />
                  <label class="form-check-label" for="maximize-yes">Yes</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" id="maximize-no" name="maximize" type="radio" value="no" />
                  <label class="form-check-label" for="maximize-no">No</label>
                </div>
              </div>
            </div>

            <div class="row mb-3">
              <label for="rate" class="col-md-5 col-form-label">Expected return (%)</label>
              <div class="col-md-7">
                <input id="rate" name="rate" type="number" class="form-control" min="0" step="0.1" required />
              </div>
            </div>

            <div class="row mb-3">
              <label for="current-age" class="col-md-5 col-form-label">Current age</label>
              <div class="col-md-7">
                <input id="current-age" name="currentAge" type="number" class="form-control" min="0" step="1"
                  required />
              </div>
            </div>

            <div class="row mb-3">
              <label for="retirement-age" class="col-md-5 col-form-label">Retirement age</label>
              <div class="col-md-7">
                <input id="retirement-age" name="retirementAge" type="number" class="form-control" min="0" step="1"
                  required />
              </div>
            </div>

            <div class="row mb-3">
              <label for="tax-rate" class="col-md-5 col-form-label">Tax rate (%)</label>
              <div class="col-md-7">
                <input id="tax-rate" name="taxRate" type="number" class="form-control" min="0" step="0.1" required />
              </div>
            </div>

            <div class="d-flex justify-content-center gap-2">
              <button type="submit" class="btn btn-primary flex-fill">Calculate</button>
              <button type="reset" class="btn btn-secondary flex-fill">Reset</button>
            </div>
          </form>

          <p class="mt-3 mb-0">
            This exercise is a simplified version of the Roth IRA Calculator
            <a href="https://www.calculator.net/roth-ira-calculator.html">Calculator.net</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
