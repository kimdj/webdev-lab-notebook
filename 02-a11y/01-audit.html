<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exercise 01 - Audit</title>
</head>

<body>
  <main>
    <form>
      <label for="name">Name</label><br>
      <input id="name" type="text" name="name" /><br>
      <label for="address">Address</label><br>
      <input id="address" type="text" name="address" />
      <br>
      <label for="city">City</label><br>
      <input id="city" type="text" name="city" />
      <br>
      <label for="zip">Zip Code</label><br>
      <input id="zip" type="text" name="zip" />
      <br>
      Credit Card Type:<br>
      <input id="visa" type="radio" name="card" value="visa" /> <label for="visa">Visa</label><br>
      <input id="mastercard" type="radio" name="card" value="mastercard" /> <label
        for="mastercard">MasterCard</label><br>
      <input id="amex" type="radio" name="card" value="amex" /> <label for="amex">American Express</label><br>
      <label for="cc-number">Credit Card Number</label><br>
      <input id="cc-number" type="text" name="cc_number" /><br>
      <label for="cvv">CVC</label><br>
      <input id="cvv" type="text" name="cvv" /><br>
      <input type="button" value="Submit" />
    </form>
  </main>
</body>

</html>
